<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implantação - Grupo Empresarial Pastelandia</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo"><span>🚀</span></div>
      <div>
        <h1>Painel de Implantação</h1>
        <p class="subtitle">Grupo Empresarial Pastelandia</p>
      </div>
    </div>
    <div class="header-center">
      <button class="nav-btn" data-page="calendar">📋 Calendário</button>
      <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
    </div>
    <div class="header-right">
      <div class="week-nav">
        <button class="btn-icon" id="prevWeek">‹</button>
        <span id="weekLabel"></span>
        <button class="btn-icon" id="nextWeek">›</button>
      </div>
      <button class="btn-today" id="todayBtn">📅 Hoje</button>
      <button class="btn-reset" id="resetBtn">🗑️ Resetar</button>
    </div>
  </header>

  <main class="main-layout">
    <!-- Sidebar: empresas -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🏢 Empresas</h2>
        <span class="pill" id="backlogCount">0</span>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar empresa..." />
      </div>
      <div class="empresa-list" id="backlog" data-zone="backlog"></div>
    </aside>

    <!-- Página Calendário (por técnico) -->
    <section class="calendar-section page-content" id="pageCalendar">
      <div class="tech-tabs">
        <button class="tech-tab active" data-tech="DIAS"><span class="tech-avatar">D</span> DIAS</button>
        <button class="tech-tab" data-tech="FRANCA"><span class="tech-avatar">F</span> FRANÇA</button>
        <button class="tech-tab" data-tech="RAMOS"><span class="tech-avatar">R</span> RAMOS</button>
        <button class="tech-tab" data-tech="VIDAL"><span class="tech-avatar">V</span> VIDAL</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <span class="legend-item ok">✅ Completo</span>
        <span class="legend-item warn">⚠️ Pendente</span>
        <span class="legend-item bad">❌ Não recebido</span>
      </div>
    </section>

    <!-- Página Dashboard (todos) -->
    <section class="calendar-section page-content hidden" id="pageDashboard">
      <div class="dashboard-header">
        <h2>📊 Visão Geral - Todos os Técnicos</h2>
      </div>
      <div class="calendar-grid" id="dashboardGrid"></div>
      <div class="legend">
        <span class="legend-item"><span class="tech-badge-legend db">D</span> DIAS</span>
        <span class="legend-item"><span class="tech-badge-legend fb">F</span> FRANÇA</span>
        <span class="legend-item"><span class="tech-badge-legend rb">R</span> RAMOS</span>
        <span class="legend-item"><span class="tech-badge-legend vb">V</span> VIDAL</span>
      </div>
    </section>
  </main>

  <!-- Modal adicionar cliente -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Adicionar Cliente</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Empresa:</label>
        <select id="modalCompanySelect" class="modal-select"></select>
        <label class="modal-label">Técnico:</label>
        <select id="modalTechSelect" class="modal-select">
          <option value="DIAS">DIAS</option>
          <option value="FRANCA">FRANÇA</option>
          <option value="RAMOS">RAMOS</option>
          <option value="VIDAL">VIDAL</option>
        </select>
        <label class="modal-label">Duração:</label>
        <select id="modalDuration" class="modal-select">
          <option value="1">1 horário</option>
          <option value="2">2 horários</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">Cancelar</button>
        <button class="btn-confirm" id="modalConfirm">✓ Adicionar</button>
      </div>
    </div>
  </div>

  <!-- Tooltip flutuante -->
  <div class="tooltip" id="tooltip"></div>

  <script src="script.js"></script>
</body>
</html>
