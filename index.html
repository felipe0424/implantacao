<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implantação - Grupo Empresarial Pastelandia</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo"><span>🚀</span></div>
      <div>
        <h1>Painel de Implantação</h1>
        <p class="subtitle">Grupo Empresarial Pastelandia</p>
      </div>
    </div>
    <div class="header-right">
      <div class="week-nav">
        <button class="btn-icon" id="prevWeek">‹</button>
        <span id="weekLabel"></span>
        <button class="btn-icon" id="nextWeek">›</button>
      </div>
      <button class="btn-today" id="todayBtn">📅 Hoje</button>
      <button class="btn-reset" id="resetBtn">🗑️ Resetar</button>
    </div>
  </header>

  <main class="main-layout">
    <!-- Sidebar: empresas -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🏢 Empresas</h2>
        <span class="pill" id="backlogCount">0</span>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar empresa..." />
      </div>
      <div class="empresa-list" id="backlog" data-zone="backlog"></div>
    </aside>

    <!-- Calendário -->
    <section class="calendar-section">
      <!-- Tabs de técnicos -->
      <div class="tech-tabs">
        <button class="tech-tab active" data-tech="DIAS"><span class="tech-avatar">D</span> DIAS</button>
        <button class="tech-tab" data-tech="FRANCA"><span class="tech-avatar">F</span> FRANÇA</button>
        <button class="tech-tab" data-tech="RAMOS"><span class="tech-avatar">R</span> RAMOS</button>
        <button class="tech-tab" data-tech="VIDAL"><span class="tech-avatar">V</span> VIDAL</button>
        <button class="tech-tab" data-tech="ALL"><span class="tech-avatar all">✦</span> TODOS</button>
      </div>

      <!-- Grid do calendário -->
      <div class="calendar-grid" id="calendarGrid">
        <!-- Renderizado via JS -->
      </div>

      <!-- Legenda -->
      <div class="legend">
        <span class="legend-item ok">✅ Completo</span>
        <span class="legend-item warn">⚠️ Pendente</span>
        <span class="legend-item bad">❌ Não recebido</span>
      </div>
    </section>
  </main>

  <!-- Tooltip flutuante -->
  <div class="tooltip" id="tooltip"></div>

  <script src="script.js"></script>
</body>
</html>
